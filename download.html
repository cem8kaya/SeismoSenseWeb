<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting... - SeismoSense</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #0D1F35;
            /* Matching your theme */
            color: white;
            margin: 0;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #3BCEAC;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .message {
            text-align: center;
            font-size: 1.1rem;
        }

        a {
            color: #3BCEAC;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="message">
        <div class="spinner"></div>
        <p>Redirecting to the app store...</p>
        <p style="font-size: 0.85rem; color: #8BA3BF; margin-top: 12px;">If nothing happens, <a
                href="index.html#download">click here</a>.</p>
    </div>

    <script>
        // ⚠️ PLease replace these dummy URLs with your actual App Store & Play Store links
        const APP_STORE_URL = "https://apps.apple.com/app/idYOUR_APP_ID";
        const PLAY_STORE_URL = "https://play.google.com/store/apps/details?id=com.yourcompany.seismosense";

        // Redirection for PC / unknown devices (directs them back to features/download buttons on your website)
        const FALLBACK_URL = "index.html#download";

        function getMobileOperatingSystem() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;

            // iOS detection
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                return 'iOS';
            }

            // Android detection
            if (/android/i.test(userAgent)) {
                return 'Android';
            }

            return 'unknown';
        }

        window.onload = function () {
            const os = getMobileOperatingSystem();

            if (os === 'iOS') {
                // Instantly redirect iPhone/iPad users to the App Store
                window.location.replace(APP_STORE_URL);
            } else if (os === 'Android') {
                // Instantly redirect Android users to the Google Play Store
                window.location.replace(PLAY_STORE_URL);
            } else {
                // If it's a Desktop (Windows/Mac) or unrecognized, redirect to your landing page's download section
                window.location.replace(FALLBACK_URL);
            }
        };
    </script>
</body>

</html>
